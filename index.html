<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Rankings - 聚合排名</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
  }
  h1 {
    font-size: 28px;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: #64748b;
    font-size: 14px;
    margin-bottom: 50px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 380px));
    gap: 24px;
    width: 100%;
    max-width: 800px;
    justify-content: center;
  }
  .card {
    background: #1e293b;
    border-radius: 16px;
    padding: 32px;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s, border-color .2s;
    border: 1px solid #334155;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(59,130,246,.15);
    border-color: #3b82f6;
  }
  .icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .card-desc {
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.5;
  }
  .card-count {
    margin-top: 16px;
    font-size: 12px;
    color: #64748b;
    background: #0f172a;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .footer {
    margin-top: 60px;
    font-size: 12px;
    color: #475569;
  }
</style>
</head>
<body>
  <h1>📊 Alex Rankings</h1>
  <div class="subtitle">聚合排名入口 · 选择你想对比的领域</div>

  <div class="cards">
    <a class="card" href="chip_rankings.html">
      <div class="icon">📱</div>
      <div class="card-title">手机芯片排名</div>
      <div class="card-desc">移动处理器综合性能对比<br>涵盖 Snapdragon、Dimensity、A-series 等旗舰芯片</div>
      <div class="card-count">点击查看 →</div>
    </a>

    <a class="card" href="model-benchmark-chart.html">
      <div class="icon">🤖</div>
      <div class="card-title">AI 模型 Benchmark</div>
      <div class="card-desc">大语言模型多维度能力对比<br>覆盖 13 个基准测试 · 40+ 模型排名</div>
      <div class="card-count">点击查看 →</div>
    </a>
  </div>

  <div class="footer">Alex Rankings · 部署于 GitHub Pages</div>
</body>
</html>
