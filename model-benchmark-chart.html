  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#0f172a; color:#e2e8f0; padding:20px; }
  .container { max-width:900px; margin:0 auto; }
  h1 { text-align:center; margin-bottom:8px; font-size:24px; }
  .subtitle { text-align:center; color:#94a3b8; margin-bottom:30px; font-size:14px; }
  .model-row { display:flex; align-items:center; padding:10px 0; border-bottom:1px solid #1e293b; cursor:pointer; transition:background .15s; }
  .model-row:hover { background:#1e293b; }
  .model-name { width:220px; font-size:13px; font-weight:500; padding-right:12px; flex-shrink:0; }
  .bar-wrap { flex:1; height:28px; background:#1e293b; border-radius:4px; position:relative; overflow:hidden; }
  .bar-fill { height:100%; background:linear-gradient(90deg, #3b82f6, #60a5fa); border-radius:4px; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; transition:width .6s ease; }
  .bar-value { font-size:12px; font-weight:600; color:#fff; }
  .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.7); z-index:100; align-items:center; justify-content:center; }
  .modal-overlay.active { display:flex; }
  .modal { background:#1e293b; border-radius:12px; width:90%; max-width:500px; max-height:80vh; overflow-y:auto; padding:24px; }
  .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .modal-title { font-size:18px; font-weight:600; }
  .modal-close { background:none; border:none; color:#94a3b8; font-size:20px; cursor:pointer; }
  .modal-close:hover { color:#fff; }
  .detail-row { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid #334155; }
  .detail-label { width:180px; font-size:13px; color:#94a3b8; flex-shrink:0; }
  .detail-bar-wrap { flex:1; height:20px; background:#0f172a; border-radius:3px; position:relative; overflow:hidden; }
  .detail-bar-fill { height:100%; border-radius:3px; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; }
  .detail-value { font-size:11px; font-weight:600; color:#fff; }
  .detail-desc { font-size:10px; color:#64748b; margin-top:2px; line-height:1.2; }
  .rank { color:#64748b; font-size:11px; margin-right:6px; width:24px; text-align:right; flex-shrink:0; }
  @media(max-width:600px){ .model-name{width:140px;font-size:12px;} .rank{width:20px;} }
</style>

const maxIndex = Math.max(...models.map(m => m.index));
const chart = document.getElementById('chart');

models.forEach((m, i) => {
  const row = document.createElement('div');
  row.className = 'model-row';
  row.onclick = () => openModal(i);
  const pct = (m.index / maxIndex * 100).toFixed(1);
  row.innerHTML = `
    <div class="rank">#${i+1}</div>
    <div class="model-name">${m.name}</div>
    <div class="bar-wrap">
      <div class="bar-fill" style="width:0%" data-width="${pct}%">
        <span class="bar-value">${m.index}</span>
      </div>
    </div>
  `;
  chart.appendChild(row);
  setTimeout(() => { row.querySelector('.bar-fill').style.width = pct + '%'; }, 50 + i * 30);
});

function openModal(idx) {
  const m = models[idx];
  document.getElementById('modal-title').textContent = m.name + ' 详细得分';
  const body = document.getElementById('modal-body');
  body.innerHTML = '';
  detailOrder.forEach((bench, bi) => {
    const score = m.scores[bench];
    if (score === null) return;
    const maxVal = bench === 'artificial_analysis_intelligence_index' ? 70 : 100;
    const pct = Math.min((score / maxVal * 100), 100).toFixed(1);
    const row = document.createElement('div');
    row.className = 'detail-row';
    row.innerHTML = `
      <div class="detail-label">
        <div>${benchmarkLabels[bench]}</div>
        <div class="detail-desc">${benchmarkDesc[bench]}</div>
      </div>
      <div class="detail-bar-wrap">
        <div class="detail-bar-fill" style="width:0%; background:${colors[bi % colors.length]}" data-width="${pct}%">
          <span class="detail-value">${score}${bench === 'artificial_analysis_intelligence_index' ? '' : '%'}</span>
        </div>
      </div>
    `;
    body.appendChild(row);
    setTimeout(() => { row.querySelector('.detail-bar-fill').style.width = pct + '%'; }, 50);
  });
  document.getElementById('modal').classList.add('active');
}

function closeModal(e) {
  if (!e || e.target.id === 'modal') {
    document.getElementById('modal').classList.remove('active');
  }
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
